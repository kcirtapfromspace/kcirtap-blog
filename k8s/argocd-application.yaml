apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kcirtap-site
  namespace: argocd
  # Uncomment below to use ArgoCD Image Updater (requires installation in cluster)
  # See: https://argocd-image-updater.readthedocs.io/
  # annotations:
  #   argocd-image-updater.argoproj.io/image-list: site=ghcr.io/kcirtapfromspace/kcirtap-blog
  #   argocd-image-updater.argoproj.io/site.update-strategy: latest
  #   argocd-image-updater.argoproj.io/write-back-method: git
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/kcirtapfromspace/kcirtap-blog.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: kcirtap

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Health checks
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
