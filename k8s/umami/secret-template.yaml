# Template for creating the sealed secret
# DO NOT commit this file with real values - use it to generate the sealed secret
#
# Steps:
# 1. Generate secure values:
#    APP_SECRET=$(openssl rand -base64 32)
#    POSTGRES_PASSWORD=$(openssl rand -base64 24)
#
# 2. Update this file with the generated values
#
# 3. Create sealed secret:
#    kubeseal --format yaml < k8s/umami/secret-template.yaml > k8s/umami/sealed-secret.yaml
#
# 4. Commit sealed-secret.yaml (NOT this file with real values)
#
apiVersion: v1
kind: Secret
metadata:
  name: umami-secrets
  namespace: umami
type: Opaque
stringData:
  APP_SECRET: "REPLACE_WITH_openssl_rand_base64_32"
  POSTGRES_USER: "umami"
  POSTGRES_PASSWORD: "REPLACE_WITH_openssl_rand_base64_24"
  POSTGRES_DB: "umami"
  DATABASE_URL: "postgresql://umami:REPLACE_WITH_SAME_PASSWORD@umami-postgres:5432/umami"
