apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: umami-postgres-pvc
  namespace: umami
  labels:
    app.kubernetes.io/name: umami-postgres
    app.kubernetes.io/component: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: umami-postgres
  namespace: umami
  labels:
    app.kubernetes.io/name: umami-postgres
    app.kubernetes.io/component: database
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: umami-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: umami-postgres
        app.kubernetes.io/component: database
    spec:
      nodeSelector:
        storage.longhorn.io/enabled: "true"
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: umami-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: umami-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: umami-secrets
                  key: POSTGRES_DB
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: umami-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: umami-postgres
  namespace: umami
  labels:
    app.kubernetes.io/name: umami-postgres
    app.kubernetes.io/component: database
spec:
  selector:
    app.kubernetes.io/name: umami-postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
