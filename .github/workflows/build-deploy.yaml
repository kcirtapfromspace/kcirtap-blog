name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [content-updated, resume-updated, wasm-updated, posts-updated]
  workflow_dispatch:
    inputs:
      purge_cache:
        description: 'Purge Cloudflare cache'
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout blog repo
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────────
      # SYNC CONTENT FROM OTHER REPOS
      # ─────────────────────────────────────────────────────────────

      - name: Fetch blog posts from obsidian
        uses: actions/checkout@v4
        with:
          repository: kcirtapfromspace/obsidian
          path: _obsidian
          token: ${{ secrets.OBSIDIAN_REPO_TOKEN }}
          sparse-checkout: |
            the_archives/archives

      - name: Sync blog posts
        run: |
          mkdir -p content/posts
          echo "Syncing posts from obsidian repository..."

          # Sync posts from the_archives/archives
          if [ -d "_obsidian/the_archives/archives" ]; then
            # Copy standalone markdown files with frontmatter
            for file in _obsidian/the_archives/archives/*.md; do
              if [ -f "$file" ]; then
                if head -1 "$file" | grep -q "^---"; then
                  cp "$file" content/posts/
                  echo "Copied file: $(basename $file)"
                else
                  echo "Skipped (no frontmatter): $(basename $file)"
                fi
              fi
            done

            # Copy folders with index.md that has frontmatter (page bundles)
            for dir in _obsidian/the_archives/archives/*/; do
              if [ -d "$dir" ]; then
                dirname=$(basename "$dir")
                if [ -f "${dir}index.md" ]; then
                  if head -1 "${dir}index.md" | grep -q "^---"; then
                    cp -r "$dir" "content/posts/$dirname"
                    echo "Copied folder: $dirname"
                  else
                    echo "Skipped folder (no frontmatter): $dirname"
                  fi
                else
                  echo "Skipped folder (no index.md): $dirname"
                fi
              fi
            done
            echo "Posts synced successfully"
          fi

          # List synced content
          echo "Content directory:"
          ls -la content/posts/

      - name: Convert frontmatter for Zola compatibility
        run: python3 scripts/convert_frontmatter.py content/posts

      - name: Fetch resume from job-search
        uses: actions/checkout@v4
        with:
          repository: kcirtapfromspace/job-search
          path: _job-search
          token: ${{ secrets.OBSIDIAN_REPO_TOKEN }}
          sparse-checkout: |
            Patrick_Deutsch_Master_Resume_2026.yaml
            rendercv_output

      - name: Sync resume files
        run: |
          mkdir -p static/resume
          cp _job-search/Patrick_Deutsch_Master_Resume_2026.yaml resume.yaml
          [ -f _job-search/rendercv_output/Patrick_Deutsch_CV.pdf ] && \
            cp _job-search/rendercv_output/Patrick_Deutsch_CV.pdf static/resume/cv.pdf
          [ -f _job-search/rendercv_output/Patrick_Deutsch_CV.html ] && \
            cp _job-search/rendercv_output/Patrick_Deutsch_CV.html static/resume/cv.html

      - name: Fetch WASM from sudoku
        uses: actions/checkout@v4
        with:
          repository: kcirtapfromspace/sudoku
          path: _sudoku
          token: ${{ secrets.OBSIDIAN_REPO_TOKEN }}
          sparse-checkout: |
            crates/sudoku-wasm/www/pkg

      - name: Sync WASM files
        run: |
          mkdir -p static/sudoku
          if [ -d "_sudoku/crates/sudoku-wasm/www/pkg" ]; then
            cp _sudoku/crates/sudoku-wasm/www/pkg/*.wasm static/sudoku/ 2>/dev/null || true
            cp _sudoku/crates/sudoku-wasm/www/pkg/*.js static/sudoku/ 2>/dev/null || true
          fi

      # ─────────────────────────────────────────────────────────────
      # BUILD SITE
      # ─────────────────────────────────────────────────────────────

      - name: Install Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola@0.19.2

      - name: Build site
        run: zola build

      # ─────────────────────────────────────────────────────────────
      # BUILD AND PUSH DOCKER IMAGE
      # ─────────────────────────────────────────────────────────────

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─────────────────────────────────────────────────────────────
      # UPDATE K8S MANIFESTS FOR ARGOCD
      # ─────────────────────────────────────────────────────────────

      - name: Update deployment manifest
        if: github.event_name != 'pull_request'
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)
          sed -i "s|image: ghcr.io/kcirtapfromspace/kcirtap-blog:.*|image: ghcr.io/kcirtapfromspace/kcirtap-blog:${SHORT_SHA}|g" k8s/deployment.yaml

      - name: Commit updated manifests
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add k8s/deployment.yaml
          git diff --staged --quiet || git commit -m "chore: update image to ${GITHUB_SHA::7} [skip ci]"
          git push

      # ─────────────────────────────────────────────────────────────
      # PURGE CLOUDFLARE CACHE
      # ─────────────────────────────────────────────────────────────

      - name: Purge Cloudflare cache
        if: github.event_name != 'pull_request' && (github.event.inputs.purge_cache == 'true' || github.event.inputs.purge_cache == null)
        env:
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF_ZONE_ID" ] && [ -n "$CF_API_TOKEN" ]; then
            curl -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data '{"purge_everything":true}'
          fi
